name: migrantpay
description: "MigrantPay - Zero-Fee Remittance & Digital Wallet for Migrant Workers"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  lottie: ^3.1.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  pin_code_fields: ^8.0.1
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.2.0+3
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  image_picker: ^1.1.2
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
